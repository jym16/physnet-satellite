project:
  type: website
  output-dir: docs
  resources:
    - assets/
    - data/
    - sources/
    - scripts/

website:
  title: "Physical Networks"
  description: "Current website and archive for the Physical Networks satellite series."
  site-url: "https://jym16.github.io/physnet-satellite/"
  repo-url: "https://github.com/jym16/physnet-satellite"
  favicon: assets/img/common/logos/common_logo_physnet-mark.png
  navbar:
    background: "white"
    foreground: "#4f5b66"
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Program"
        href: program.qmd
      - text: "Editions"
        menu:
          - text: "Archive"
            href: archive.qmd
          - text: "2026, Boston"
            href: index.qmd
          - text: "2025, Maastricht"
            href: editions/2025/index.qmd
          - text: "2024, Québec City"
            href: editions/2024/index.qmd
          - text: "2023, Vienna"
            href: editions/2023/index.qmd
      - text: "Sources"
        href: sources.qmd
    right:
      - icon: code-slash
        href: "https://github.com/jym16/physnet-satellite"
        aria-label: "Website source"
      - icon: github
        href: "https://github.com/jym16/physnet-satellite"
        aria-label: "GitHub repository"
  page-footer:
    left: "Physical Networks Satellite Series"
    right: "Static site built with Quarto."
  search: true
  page-navigation: true
  back-to-top-navigation: true

format:
  html:
    theme: default
    css: assets/styles.css
    toc: true
    toc-depth: 3
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    code-copy: true
    anchor-sections: true
    fontsize: 1rem
    linkcolor: "#1f4e79"

execute:
  freeze: auto
